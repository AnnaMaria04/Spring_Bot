<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Spring Village Support Bot</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1f17;
        color: #e8f3ec;
      }
      .card {
        max-width: 32rem;
        padding: 2rem 2.5rem;
        text-align: center;
        line-height: 1.5;
      }
      h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.15rem 0.4rem;
        border-radius: 0.3rem;
      }
      p { opacity: 0.85; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Spring Village Support Bot 🌿</h1>
      <p>This server hosts the Telegram bot. There is no web UI.</p>
      <p>The Telegram webhook endpoint is <code>/api/webhook</code>.</p>
    </main>
  </body>
</html>
